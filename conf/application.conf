include "backend.conf"

# This is the main configuration file for the application.
# ~~~~~

appName = eacd-file-processor

# Default http client
play.modules.enabled += "uk.gov.hmrc.play.bootstrap.HttpClientV2Module"

# Play Modules
play.modules.enabled += "uk.gov.hmrc.eacdfileprocessor.Module"

play.modules.enabled += "uk.gov.hmrc.mongo.play.PlayMongoModule"

play.modules.enabled += "uk.gov.hmrc.eacdfileprocessor.config.ServiceBindings"

#Internal Auth Connection Details
play.modules.enabled += "uk.gov.hmrc.internalauth.client.modules.InternalAuthModule"

# Object Store Module
play.modules.enabled += "uk.gov.hmrc.objectstore.client.play.modules.ObjectStoreModule"

# The application languages
# ~~~~~
play.i18n.langs = ["en"]

# Router
# ~~~~~
# Define the Router object to use for this application.
# This router will be looked up first when the application is starting up,
# so make sure this is the entry point.
# Furthermore, it's assumed your route file is named properly.
# So for an application router like `my.application.Router`,
# you may need to define a router file `conf/my.application.routes`.
# Default to Routes in the root package (and conf/routes)
# !!!WARNING!!! DO NOT CHANGE THIS ROUTER
play.http.router = prod.Routes

# Microservice specific config

mongodb {
  uri = "mongodb://localhost:27017/eacd-file-processor"
}

microservice {
  services {
    auth {
      host = localhost
      port = 8500
    }
    object-store {
      host = localhost
      port = 8464
    }
    internal-auth {
      protocol = http
      host     = localhost
      port     = 8470
    }
    email {
          host = localhost
          port = 8300
          }
    service-enrolment-config {
      protocol = http
      host     = localhost
      port     = 7769
    }
    enrolment-store-proxy {
      protocol = http
      host     = localhost
      port     = 7775
    }
  }
}

time-to-live.time = "3"
internal-auth.token = "12345678"
object-store.default-retention-period = "6-months"

locking.timeoutMinutes = 15

sec0 {
  cache-refresh-hours = 24
  get-services-path = "/service-enrolment-config/services"
}

akka {
  quartz {
    threadPool {
      threadCount = 1
      threadPriority = 5
      daemonThreads = true
    }
    defaultTimezone = UTC
  }
}

internalAuth.enabled = false

fileExpiryDays = 60

work-item.retry-in-progress-after.seconds = 30
#30 days
work-item.ttlInHours = 720

locking.timeoutMinutes = 15

DeEnrolmentWorkItemConcurrency = 5

initialExpiryDays  = 7

akka {
  quartz {
    threadPool {
      threadCount = 1
      threadPriority = 5
      daemonThreads = true
    }
    defaultTimezone = UTC
  }
}

schedules {
  ProcessApprovedFileJob {
    description     = "Processes approved files to send to work items"
    expression      = "0_*/15_*_?_*_*_*" # run every 15 minutes
    enabled         = true
  }
  DeEnrolmentWorkItemPullJob {
    description     = "Pulls and validates outstanding file work items"
    expression      = "0/1_*_*_?_*_*_*"
    enabled         = true
  }
  FileWorkItemPullJob {
    description = "Pulls and validates outstanding file work items"
    expression  = "0/1_*_*_?_*_*_*"
    enabled     = true
  }
  ExpiredFileDeletionJob {
    description = "Deletes expired files from storage"
    expression  = "0 0 2 ? * * *"  // Daily at 2 AM
    enabled     = true
  }
}